<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrendWorld — Global Top Produits</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --red: #FF3B30;
  --orange: #FF6900;
  --yellow: #FFD000;
  --white: #FFFFFF;
  --bg: #F5F5F5;
  --card: #FFFFFF;
  --text: #111111;
  --muted: #666666;
  --border: #E8E8E8;
  --radius: 8px;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;}
button{font-family:inherit;cursor:pointer;border:none;}

/* ══ PROMO BAR ══ */
.promo-bar{
  background:linear-gradient(90deg,#FF3B30,#FF6900,#FF3B30);
  background-size:200% 100%;
  animation:grad-move 4s linear infinite;
  color:#fff;text-align:center;
  padding:7px 1rem;font-size:12px;font-weight:600;
}
@keyframes grad-move{0%{background-position:0%}100%{background-position:200%}}

/* ══ HEADER & LOGO ══ */
.nav-wrapper{position:sticky;top:0;z-index:1000;background:#fff;box-shadow:0 1px 0 var(--border);}
.nav-top{display:flex;align-items:center;justify-content:space-between;padding:10px 1.5rem;max-width:1400px;margin:0 auto;gap:1rem;}
.logo{font-size:1.5rem;font-weight:900;background:linear-gradient(135deg,var(--red),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

/* ══ ZONE ABONNEMENT & ESSAI ══ */
.sub-zone {
  background: #fff;
  border: 2px dashed var(--orange);
  margin: 1rem 1.5rem;
  padding: 1.2rem;
  border-radius: var(--radius);
  text-align: center;
}
.sub-title { font-size: 14px; font-weight: 800; margin-bottom: 8px; color: #111; }
.sub-btn-container { display: flex; gap: 10px; justify-content: center; margin-top: 10px; }
.btn-sub { background: linear-gradient(90deg, #ff4500, var(--orange)); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 12px; font-weight: 800; text-transform: uppercase; }
.btn-trial { background: #111; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 12px; font-weight: 800; text-transform: uppercase; }

/* ══ NAV CATEGORIES ══ */
.nav-cats{background:#fff;border-top:1px solid var(--border);overflow-x:auto;scrollbar-width:none;}
.nav-cats-inner{display:flex;align-items:center;padding:0 1.5rem;}
.nav-cat-btn{padding:12px 16px;font-size:12px;font-weight:600;white-space:nowrap;color:var(--muted);background:transparent;}
.nav-cat-btn.active{color:var(--orange);border-bottom:2px solid var(--orange);}

/* ══ GRILLE PRODUITS ══ */
.section{max-width:1400px;margin:0 auto;padding:1.2rem 1.5rem;}
.products-grid{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;}
.p-card{background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);position:relative;display:flex;flex-direction:column;}
.p-img-wrap{position:relative;aspect-ratio:1/1;background:#f9f9f9;display:flex;align-items:center;justify-content:center;font-size:4rem;}
.p-badge{position:absolute;top:7px;left:7px;font-size:9px;font-weight:900;padding:3px 7px;border-radius:3px;color:#fff;}
.b-usa{background:#002868;} .b-china{background:#CC0000;} .b-korea{background:#003478;} .b-japan{background:#111; border:1px solid #bc002d;}
.p-body{padding:10px;display:flex;flex-direction:column;gap:4px;}
.p-name{font-size:12px;font-weight:600;line-height:1.4;}
.p-price{font-size:1.2rem;font-weight:900;color:var(--red);}
</style>
</head>
<body>

<div class="promo-bar">⚡️ OFFRES ÉCLAIR : JUSQU'À -70% SUR LES PRODUITS VIRAUX</div>

<div class="nav-wrapper">
  <div class="nav-top">
    <div class="logo">TrendWORLD</div>
  </div>
  <div class="nav-cats">
    <div class="nav-cats-inner">
      <button class="nav-cat-btn active">🏅 Tous</button>
      <button class="nav-cat-btn">🇺🇸 USA</button>
      <button class="nav-cat-btn">🇨🇳 Chine</button>
      <button class="nav-cat-btn">🇰🇷 Corée</button>
      <button class="nav-cat-btn">🇯🇵 Japon</button>
    </div>
  </div>
</div>

<!-- LE BOUTON ABONNEMENT ET ESSAI -->
<div class="sub-zone">
  <div class="sub-title">💎 DEVENIR MEMBRE VIP PRIVILÈGE</div>
  <p style="font-size:11px; color:var(--muted)">Accédez aux ventes privées secrètes avant tout le monde.</p>
  <div class="sub-btn-container">
    <button class="btn-trial" onclick="alert('Période d\'essai activée ! Pour l\'instant fictif.')">🎁 Essai Gratuit</button>
    <button class="btn-sub" onclick="alert('Merci pour votre intérêt à l\'abonnement ! Pour l\'instant fictif.')">⚡ S'abonner</button>
  </div>
</div>

<div class="section">
  <div class="products-grid">
    
    <!-- USA -->
    <div class="p-card">
      <div class="p-img-wrap"><div class="p-badge b-usa">🇺🇸 USA</div>🎧</div>
      <div class="p-body"><div class="p-name">AirPods Pro 2</div><div class="p-price">$219</div></div>
    </div>

    <!-- CHINE -->
    <div class="p-card">
      <div class="p-img-wrap"><div class="p-badge b-china">🇨🇳 CHINE</div>🍟</div>
      <div class="p-body"><div class="p-name">Air Fryer Pro XL</div><div class="p-price">$79</div></div>
    </div>

    <!-- CORÉE -->
    <div class="p-card">
      <div class="p-img-wrap"><div class="p-badge b-korea">🇰🇷 CORÉE</div>✨</div>
      <div class="p-body"><div class="p-name">Glow Serum Ginseng</div><div class="p-price">$19.99</div></div>
    </div>

    <!-- JAPON -->
    <div class="p-card">
      <div class="p-img-wrap"><div class="p-badge b-japan">🇯🇵 JAPON</div>⌨️</div>
      <div class="p-body"><div class="p-name">Clavier Mécanique HHKB</div><div class="p-price">$249</div></div>
    </div>

  </div>
</div>

</body>
</html>
